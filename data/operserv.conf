service {
	nick = "OperServ"
	user = "services"
	host = "services.host"
	gecos = "Operator Service"
}

module {
	name = "operserv"
	client = "OperServ"
	autokillexpiry = 1d
	chankillexpiry = 1d
	snlineexpiry = 1d
	sqlineexpiry = 1d
	akillonadd = yes
	killonsnline = yes
	killonsqline = yes
	addakiller = no
	akillids = no
	opersonly = yes
}

command { service = "OperServ"; name = "HELP"; command = "generic/help"; }

module { name = "os_akill" }
command { service = "OperServ"; name = "AKILL"; command = "operserv/akill"; permission = "operserv/akill"; }

module { name = "os_chankill" }
command { service = "OperServ"; name = "CHANKILL"; command = "operserv/chankill"; permission = "operserv/chankill"; }

module {
	name = "os_defcon"
	defaultlevel = 5
	level4 = "forcechanmodes"
	level3 = "forcechanmodes"
	level2 = "forcechanmodes"
	level1 = "forcechanmodes nonewclients operonly"
	chanmodes = "+R"
	timeout = 1h
	globalondefcon = yes
}
command { service = "OperServ"; name = "DEFCON"; command = "operserv/defcon"; permission = "operserv/defcon"; }

